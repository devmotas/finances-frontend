<section class="auth-page">
  <article class="auth-card">
    <header class="auth-card__head">
      <span class="auth-card__logo" aria-hidden="true">
        <lucide-icon name="wallet" [size]="26" [strokeWidth]="2"></lucide-icon>
      </span>
      <h1 class="auth-card__title">Criar conta</h1>
      <p class="auth-card__subtitle">Cadastre-se para começar a organizar suas finanças.</p>
    </header>

    <form class="auth-form" [formGroup]="form" (ngSubmit)="onSubmit()">
      <label
        class="auth-field"
        [class.auth-field--invalid]="form.controls.name.touched && form.controls.name.invalid"
      >
        <span class="auth-field__label">Nome</span>
        <span class="auth-field__control">
          <span class="auth-field__icon" aria-hidden="true">
            <lucide-icon name="user" [size]="18" [strokeWidth]="2"></lucide-icon>
          </span>
          <input
            type="text"
            formControlName="name"
            placeholder="Seu nome completo"
            autocomplete="name"
            maxlength="200"
            [attr.aria-invalid]="form.controls.name.touched && form.controls.name.invalid"
          />
        </span>
        @if (form.controls.name.touched && form.controls.name.errors?.['required']) {
          <span class="auth-field__err" role="alert">Informe seu nome.</span>
        }
        @if (form.controls.name.touched && form.controls.name.errors?.['minlength']) {
          <span class="auth-field__err" role="alert">Use pelo menos 2 caracteres.</span>
        }
        @if (form.controls.name.touched && form.controls.name.errors?.['maxlength']) {
          <span class="auth-field__err" role="alert">No máximo 200 caracteres.</span>
        }
      </label>

      <label
        class="auth-field"
        [class.auth-field--invalid]="form.controls.email.touched && form.controls.email.invalid"
      >
        <span class="auth-field__label">E-mail</span>
        <span class="auth-field__control">
          <span class="auth-field__icon" aria-hidden="true">
            <lucide-icon name="mail" [size]="18" [strokeWidth]="2"></lucide-icon>
          </span>
          <input
            type="email"
            formControlName="email"
            placeholder="voce@email.com"
            autocomplete="email"
            [attr.aria-invalid]="form.controls.email.touched && form.controls.email.invalid"
          />
        </span>
        @if (form.controls.email.touched && form.controls.email.errors?.['required']) {
          <span class="auth-field__err" role="alert">Informe o e-mail.</span>
        }
        @if (form.controls.email.touched && form.controls.email.errors?.['email']) {
          <span class="auth-field__err" role="alert">E-mail inválido.</span>
        }
      </label>

      <label
        class="auth-field"
        [class.auth-field--invalid]="form.controls.password.touched && form.controls.password.invalid"
      >
        <span class="auth-field__label">Senha</span>
        <span class="auth-field__control">
          <span class="auth-field__icon" aria-hidden="true">
            <lucide-icon name="lock" [size]="18" [strokeWidth]="2"></lucide-icon>
          </span>
          <input
            [type]="passwordVisible() ? 'text' : 'password'"
            formControlName="password"
            placeholder="Crie uma senha"
            autocomplete="new-password"
            [attr.aria-invalid]="form.controls.password.touched && form.controls.password.invalid"
          />
          <button
            type="button"
            class="auth-field__toggle"
            (click)="togglePasswordVisibility()"
            [attr.aria-label]="passwordVisible() ? 'Ocultar senha' : 'Mostrar senha'"
            [attr.aria-pressed]="passwordVisible()"
          >
            @if (passwordVisible()) {
              <lucide-icon name="eye-off" [size]="18" [strokeWidth]="2"></lucide-icon>
            } @else {
              <lucide-icon name="eye" [size]="18" [strokeWidth]="2"></lucide-icon>
            }
          </button>
        </span>
        @if (form.controls.password.touched && form.controls.password.errors?.['required']) {
          <span class="auth-field__err" role="alert">Informe a senha.</span>
        }
        @if (form.controls.password.touched && form.controls.password.errors?.['minlength']) {
          <span class="auth-field__err" role="alert">A senha deve ter pelo menos 6 caracteres.</span>
        }
      </label>

      <label
        class="auth-field"
        [class.auth-field--invalid]="
          (form.controls.confirmPassword.touched && form.controls.confirmPassword.invalid) ||
          (form.touched && form.hasError('passwordMismatch'))
        "
      >
        <span class="auth-field__label">Confirmar senha</span>
        <span class="auth-field__control">
          <span class="auth-field__icon" aria-hidden="true">
            <lucide-icon name="lock" [size]="18" [strokeWidth]="2"></lucide-icon>
          </span>
          <input
            [type]="confirmPasswordVisible() ? 'text' : 'password'"
            formControlName="confirmPassword"
            placeholder="Repita a senha"
            autocomplete="new-password"
            [attr.aria-invalid]="
              (form.controls.confirmPassword.touched && form.controls.confirmPassword.invalid) ||
              (form.touched && form.hasError('passwordMismatch'))
            "
          />
          <button
            type="button"
            class="auth-field__toggle"
            (click)="toggleConfirmPasswordVisibility()"
            [attr.aria-label]="confirmPasswordVisible() ? 'Ocultar confirmação de senha' : 'Mostrar confirmação de senha'"
            [attr.aria-pressed]="confirmPasswordVisible()"
          >
            @if (confirmPasswordVisible()) {
              <lucide-icon name="eye-off" [size]="18" [strokeWidth]="2"></lucide-icon>
            } @else {
              <lucide-icon name="eye" [size]="18" [strokeWidth]="2"></lucide-icon>
            }
          </button>
        </span>
        @if (form.controls.confirmPassword.touched && form.controls.confirmPassword.errors?.['required']) {
          <span class="auth-field__err" role="alert">Confirme a senha.</span>
        }
        @if (form.touched && form.hasError('passwordMismatch')) {
          <span class="auth-field__err" role="alert">As senhas não conferem.</span>
        }
      </label>

      <button type="submit" class="auth-btn auth-btn--primary">
        <span class="auth-btn__icon" aria-hidden="true">
          <lucide-icon name="user-plus" [size]="18" [strokeWidth]="2"></lucide-icon>
        </span>
        Criar cadastro
      </button>
    </form>

    <p class="auth-card__switch">
      Já tem conta?
      <a routerLink="/login">Entrar</a>
    </p>
  </article>
</section>
