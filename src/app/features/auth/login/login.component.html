<section class="auth-page">
  <article class="auth-card">
    <header class="auth-card__head">
      <span class="auth-card__logo" aria-hidden="true">
        <lucide-icon name="wallet" [size]="26" [strokeWidth]="2"></lucide-icon>
      </span>
      <h1 class="auth-card__title">Entrar</h1>
      <p class="auth-card__subtitle">Acesse sua conta para continuar gerenciando suas finanças.</p>
    </header>

    <form class="auth-form" [formGroup]="form" (ngSubmit)="onSubmit()">
      <label
        class="auth-field"
        [class.auth-field--invalid]="form.controls.email.touched && form.controls.email.invalid"
      >
        <span class="auth-field__label">E-mail</span>
        <span class="auth-field__control">
          <span class="auth-field__icon" aria-hidden="true">
            <lucide-icon name="mail" [size]="18" [strokeWidth]="2"></lucide-icon>
          </span>
          <input
            type="email"
            formControlName="email"
            placeholder="voce@email.com"
            autocomplete="email"
            [attr.aria-invalid]="form.controls.email.touched && form.controls.email.invalid"
            [attr.aria-describedby]="
              form.controls.email.touched && form.controls.email.invalid ? 'login-email-err' : null
            "
          />
        </span>
        @if (form.controls.email.touched && form.controls.email.errors?.['required']) {
          <span id="login-email-err" class="auth-field__err" role="alert">Informe o e-mail.</span>
        }
        @if (form.controls.email.touched && form.controls.email.errors?.['email']) {
          <span id="login-email-err" class="auth-field__err" role="alert">E-mail inválido.</span>
        }
      </label>

      <label
        class="auth-field"
        [class.auth-field--invalid]="form.controls.password.touched && form.controls.password.invalid"
      >
        <span class="auth-field__label">Senha</span>
        <span class="auth-field__control">
          <span class="auth-field__icon" aria-hidden="true">
            <lucide-icon name="lock" [size]="18" [strokeWidth]="2"></lucide-icon>
          </span>
          <input
            [type]="passwordVisible() ? 'text' : 'password'"
            formControlName="password"
            placeholder="Sua senha"
            autocomplete="current-password"
            [attr.aria-invalid]="form.controls.password.touched && form.controls.password.invalid"
            [attr.aria-describedby]="
              form.controls.password.touched && form.controls.password.invalid ? 'login-password-err' : null
            "
          />
          <button
            type="button"
            class="auth-field__toggle"
            (click)="togglePasswordVisibility()"
            [attr.aria-label]="passwordVisible() ? 'Ocultar senha' : 'Mostrar senha'"
            [attr.aria-pressed]="passwordVisible()"
          >
            @if (passwordVisible()) {
              <lucide-icon name="eye-off" [size]="18" [strokeWidth]="2"></lucide-icon>
            } @else {
              <lucide-icon name="eye" [size]="18" [strokeWidth]="2"></lucide-icon>
            }
          </button>
        </span>
        @if (form.controls.password.touched && form.controls.password.errors?.['required']) {
          <span id="login-password-err" class="auth-field__err" role="alert">Informe a senha.</span>
        }
      </label>

      <a class="auth-form__helper-link" routerLink="/esqueci-senha">Esqueci minha senha</a>

      <button type="submit" class="auth-btn auth-btn--primary">
        <span class="auth-btn__icon" aria-hidden="true">
          <lucide-icon name="log-in" [size]="18" [strokeWidth]="2"></lucide-icon>
        </span>
        Entrar
      </button>
    </form>

    <p class="auth-card__switch">
      Ainda não tem conta?
      <a routerLink="/cadastro">Criar cadastro</a>
    </p>
  </article>
</section>
