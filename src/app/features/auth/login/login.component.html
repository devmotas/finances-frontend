<section class="auth-page">
  <article class="auth-card">
    <header class="auth-card__head">
      <span class="auth-card__logo" aria-hidden="true">
        <lucide-icon name="wallet" [size]="26" [strokeWidth]="2"></lucide-icon>
      </span>
      <h1 class="auth-card__title">Entrar</h1>
      <p class="auth-card__subtitle">Acesse sua conta para continuar gerenciando suas finanças.</p>
    </header>

    <form class="auth-form" (submit)="onSubmit($event, email.value, password.value)">
      <label class="auth-field">
        <span class="auth-field__label">E-mail</span>
        <span class="auth-field__control">
          <span class="auth-field__icon" aria-hidden="true">
            <lucide-icon name="mail" [size]="18" [strokeWidth]="2"></lucide-icon>
          </span>
          <input #email type="email" placeholder="voce@email.com" autocomplete="email" required />
        </span>
      </label>

      <label class="auth-field">
        <span class="auth-field__label">Senha</span>
        <span class="auth-field__control">
          <span class="auth-field__icon" aria-hidden="true">
            <lucide-icon name="lock" [size]="18" [strokeWidth]="2"></lucide-icon>
          </span>
          <input
            #password
            [type]="passwordVisible() ? 'text' : 'password'"
            placeholder="Sua senha"
            autocomplete="current-password"
            required
          />
          <button
            type="button"
            class="auth-field__toggle"
            (click)="togglePasswordVisibility()"
            [attr.aria-label]="passwordVisible() ? 'Ocultar senha' : 'Mostrar senha'"
            [attr.aria-pressed]="passwordVisible()"
          >
            @if (passwordVisible()) {
              <lucide-icon name="eye-off" [size]="18" [strokeWidth]="2"></lucide-icon>
            } @else {
              <lucide-icon name="eye" [size]="18" [strokeWidth]="2"></lucide-icon>
            }
          </button>
        </span>
      </label>

      <a class="auth-form__helper-link" routerLink="/esqueci-senha">Esqueci minha senha</a>

      <button type="submit" class="auth-btn auth-btn--primary">
        <span class="auth-btn__icon" aria-hidden="true">
          <lucide-icon name="log-in" [size]="18" [strokeWidth]="2"></lucide-icon>
        </span>
        Entrar
      </button>
    </form>

    <p class="auth-card__switch">
      Ainda não tem conta?
      <a routerLink="/cadastro">Criar cadastro</a>
    </p>
  </article>
</section>
