<div class="shell">
  <header class="shell__header">
    <div class="shell__brand">
      <span class="shell__logo" aria-hidden="true">
        <lucide-icon name="wallet" [size]="26" [strokeWidth]="2"></lucide-icon>
      </span>
      <span class="shell__title">Minhas Finanças</span>
    </div>
    <div class="shell__month" role="group" aria-label="Mês de referência">
      <button type="button" class="shell__month-btn" (click)="prev()" aria-label="Mês anterior">
        <lucide-icon name="chevron-left" [size]="22" [strokeWidth]="2"></lucide-icon>
      </button>
      <span class="shell__month-label">{{ monthLabel() }}</span>
      <button type="button" class="shell__month-btn" (click)="next()" aria-label="Próximo mês">
        <lucide-icon name="chevron-right" [size]="22" [strokeWidth]="2"></lucide-icon>
      </button>
    </div>
  </header>

  <nav class="shell__tabs" aria-label="Navegação principal">
    <a
      routerLink="/visao-geral"
      routerLinkActive="is-active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="shell__tab"
    >
      <span class="shell__tab-icon" aria-hidden="true">
        <lucide-icon name="layout-dashboard" [size]="20" [strokeWidth]="2"></lucide-icon>
      </span>
      Visão Geral
    </a>
    <a routerLink="/entradas" routerLinkActive="is-active" class="shell__tab">
      <span class="shell__tab-icon shell__tab-icon--in" aria-hidden="true">
        <lucide-icon name="arrow-down-left" [size]="20" [strokeWidth]="2.25"></lucide-icon>
      </span>
      Entradas
    </a>
    <a routerLink="/saidas" routerLinkActive="is-active" class="shell__tab">
      <span class="shell__tab-icon shell__tab-icon--out" aria-hidden="true">
        <lucide-icon name="arrow-up-right" [size]="20" [strokeWidth]="2.25"></lucide-icon>
      </span>
      Saídas
    </a>
  </nav>

  <main class="shell__main">
    <router-outlet />
  </main>
</div>
