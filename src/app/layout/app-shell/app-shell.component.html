<div class="shell">
  <div class="shell__sticky">
    <header class="shell__header">
      <div class="shell__brand">
        <span class="shell__logo" aria-hidden="true">
          <lucide-icon name="wallet" [size]="26" [strokeWidth]="2"></lucide-icon>
        </span>
        <span class="shell__title">Minhas Finanças</span>
      </div>
      <button
        type="button"
        class="shell__nav-toggle"
        (click)="toggleMobileNav()"
        [attr.aria-expanded]="mobileNavOpen()"
        aria-controls="shell-mobile-nav"
        [attr.aria-label]="mobileNavOpen() ? 'Fechar navegação' : 'Abrir navegação'"
      >
        <lucide-icon name="menu" [size]="24" [strokeWidth]="2"></lucide-icon>
      </button>
      <div class="shell__header-tools">
        <div class="shell__month" role="group" aria-label="Mês de referência">
          <button type="button" class="shell__month-btn" (click)="prev()" aria-label="Mês anterior">
            <lucide-icon name="chevron-left" [size]="22" [strokeWidth]="2"></lucide-icon>
          </button>
          <span class="shell__month-label">{{ monthLabel() }}</span>
          <button type="button" class="shell__month-btn" (click)="next()" aria-label="Próximo mês">
            <lucide-icon name="chevron-right" [size]="22" [strokeWidth]="2"></lucide-icon>
          </button>
        </div>
        <button
          type="button"
          class="shell__logout shell__logout--header"
          (click)="logout()"
          aria-label="Sair da conta"
        >
          <lucide-icon name="log-out" [size]="22" [strokeWidth]="2"></lucide-icon>
          <span class="shell__logout-label">Sair</span>
        </button>
      </div>
    </header>

    <nav class="shell__tabs" aria-label="Navegação principal">
      @for (item of navItems; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="item.exact ? { exact: true } : { exact: false }"
          class="shell__tab"
        >
          <span
            class="shell__tab-icon"
            [class.shell__tab-icon--in]="item.iconModifier === 'in'"
            [class.shell__tab-icon--out]="item.iconModifier === 'out'"
            aria-hidden="true"
          >
            <lucide-icon [name]="item.icon" [size]="20" [strokeWidth]="item.iconModifier ? 2.25 : 2"></lucide-icon>
          </span>
          {{ item.label }}
        </a>
      }
    </nav>
  </div>

  @if (mobileNavOpen()) {
    <button
      type="button"
      class="shell__drawer-backdrop"
      (click)="closeMobileNav()"
      aria-label="Fechar menu de navegação"
    ></button>
  }

  <aside
    id="shell-mobile-nav"
    class="shell__drawer"
    [class.shell__drawer--open]="mobileNavOpen()"
    [attr.aria-hidden]="mobileNavOpen() ? 'false' : 'true'"
  >
    <div class="shell__drawer-head">
      <span class="shell__drawer-title">Ir para</span>
      <button
        type="button"
        class="shell__drawer-close"
        (click)="closeMobileNav()"
        aria-label="Fechar"
      >
        <lucide-icon name="x" [size]="22" [strokeWidth]="2"></lucide-icon>
      </button>
    </div>
    <nav class="shell__drawer-nav" aria-label="Navegação principal">
      @for (item of navItems; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="item.exact ? { exact: true } : { exact: false }"
          class="shell__tab shell__tab--drawer"
          (click)="closeMobileNav()"
        >
          <span
            class="shell__tab-icon"
            [class.shell__tab-icon--in]="item.iconModifier === 'in'"
            [class.shell__tab-icon--out]="item.iconModifier === 'out'"
            aria-hidden="true"
          >
            <lucide-icon [name]="item.icon" [size]="20" [strokeWidth]="item.iconModifier ? 2.25 : 2"></lucide-icon>
          </span>
          {{ item.label }}
        </a>
      }
    </nav>
    <div class="shell__drawer-footer">
      <button
        type="button"
        class="shell__logout shell__logout--drawer"
        (click)="logout()"
        aria-label="Sair da conta"
      >
        <lucide-icon name="log-out" [size]="22" [strokeWidth]="2"></lucide-icon>
        <span class="shell__logout-label">Sair</span>
      </button>
    </div>
  </aside>

  <main class="shell__main">
    <router-outlet />
  </main>
</div>
