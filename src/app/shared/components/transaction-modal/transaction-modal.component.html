@if (visible()) {
  <div class="modal__backdrop" (click)="backdropClick($event)" role="presentation">
    <div
      class="modal"
      role="dialog"
      aria-modal="true"
      [attr.aria-labelledby]="'tx-modal-title'"
      (click)="$event.stopPropagation()"
    >
      <div class="modal__head">
        <h2 id="tx-modal-title" class="modal__title">{{ title() }}</h2>
        <button type="button" class="modal__x" (click)="close()" aria-label="Fechar">
          <lucide-icon name="x" [size]="22" [strokeWidth]="2"></lucide-icon>
        </button>
      </div>

      <form class="modal__form" (ngSubmit)="save()" [formGroup]="form">
        @if (blockNewWithoutCategories()) {
          <p class="modal__hint" role="alert">
            Cadastre ao menos uma categoria em <strong>Categoria</strong> na tela de Entradas ou Saídas
            antes de registrar valores.
          </p>
        }

        <label class="field">
          <span class="field__label">Categoria</span>
          <select
            class="field__input"
            formControlName="categoryId"
            title="Obrigatório — define onde este lançamento entra nos relatórios"
            [disabled]="blockNewWithoutCategories()"
          >
            <option value="">{{ categorySelectPlaceholder() }}</option>
            @for (c of categories(); track c.id) {
              <option [value]="c.id">{{ c.name }}</option>
            }
          </select>
          @if (form.controls.categoryId.touched && form.controls.categoryId.errors?.['required']) {
            <span class="field__err">Selecione uma categoria.</span>
          }
        </label>

        <label class="field">
          <span class="field__label">Descrição <span class="field__optional">(opcional)</span></span>
          <input
            class="field__input"
            type="text"
            formControlName="description"
            [placeholder]="descriptionPlaceholder()"
            autocomplete="off"
            maxlength="500"
            [disabled]="blockNewWithoutCategories()"
          />
          @if (form.controls.description.touched && form.controls.description.errors?.['maxlength']) {
            <span class="field__err">Use no máximo 500 caracteres.</span>
          }
        </label>

        <label class="field">
          <span class="field__label">Valor (R$)</span>
          <input
            class="field__input"
            type="text"
            inputmode="decimal"
            formControlName="amount"
            [placeholder]="amountPlaceholder()"
            title="Use vírgula para centavos, ex.: 1.250,50"
            autocomplete="off"
            [disabled]="blockNewWithoutCategories()"
          />
          @if (form.controls.amount.touched && form.controls.amount.errors) {
            <span class="field__err">Informe um valor maior que zero.</span>
          }
        </label>

        <label class="field">
          <span class="field__label">Data</span>
          <input
            class="field__input"
            type="date"
            formControlName="date"
            title="Data do lançamento no calendário"
            [disabled]="blockNewWithoutCategories()"
          />
        </label>

        <label class="field">
          <span class="field__label">Recorrência</span>
          <select
            class="field__input"
            formControlName="schedule"
            [disabled]="blockNewWithoutCategories()"
            title="Fixa repete todo mês; variável vale só no mês selecionado"
          >
            <option value="fixed">Fixa — todo mês</option>
            <option value="variable">Só neste mês</option>
          </select>
        </label>

        <div class="modal__actions">
          <button type="button" class="btn btn--secondary" (click)="close()">Cancelar</button>
          <button type="submit" class="btn btn--primary" [disabled]="blockNewWithoutCategories()">
            Salvar
          </button>
        </div>
      </form>
    </div>
  </div>
}
